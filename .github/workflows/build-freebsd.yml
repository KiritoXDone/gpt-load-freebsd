name: Build FreeBSD Binary

on:
  schedule:
    - cron: '0 0 * * 1'  # Every Monday at 00:00 UTC
  workflow_dispatch:
    inputs:
      version:
        description: 'Specific CLIProxyAPIPlus version to build (e.g. v6.8.45-0). Leave empty to use latest tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Get target CLIProxyAPIPlus version
        id: upstream
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(git ls-remote --tags --refs --sort='version:refname' https://github.com/router-for-me/CLIProxyAPIPlus.git \
              | tail -n1 \
              | awk -F/ '{print $3}')
          fi
          if [ -z "$VERSION" ]; then
            echo "Failed to determine target CLIProxyAPIPlus version."
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Target CLIProxyAPIPlus version: $VERSION"

      - name: Check if already built
        id: check
        run: |
          VERSION="${{ steps.upstream.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "already_built=true" >> $GITHUB_OUTPUT
            echo "Version $VERSION already built, skipping."
          else
            echo "already_built=false" >> $GITHUB_OUTPUT
            echo "Version $VERSION not built yet, proceeding with build."
          fi

      - name: Checkout CLIProxyAPIPlus source
        if: steps.check.outputs.already_built == 'false'
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPIPlus
          ref: ${{ steps.upstream.outputs.version }}

      - name: Setup Go
        if: steps.check.outputs.already_built == 'false'
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Build FreeBSD amd64 binary
        if: steps.check.outputs.already_built == 'false'
        run: |
          go mod download
          CGO_ENABLED=0 GOOS=freebsd GOARCH=amd64 go build \
            -ldflags "-s -w -X main.Version=${{ steps.upstream.outputs.version }}-plus" \
            -o cli-proxy-api-plus-freebsd-amd64 \
            ./cmd/server

      - name: Create Release
        if: steps.check.outputs.already_built == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.upstream.outputs.version }}
          name: ${{ steps.upstream.outputs.version }}
          body: |
            FreeBSD amd64 binary for [CLIProxyAPIPlus ${{ steps.upstream.outputs.version }}](https://github.com/router-for-me/CLIProxyAPIPlus/releases/tag/${{ steps.upstream.outputs.version }}).

            Built for **serv00** (FreeBSD 14.x amd64).

            ## Usage

            Download `cli-proxy-api-plus-freebsd-amd64`, upload to your serv00 server, then:

            ```bash
            chmod +x cli-proxy-api-plus-freebsd-amd64
            ./cli-proxy-api-plus-freebsd-amd64
            ```
          files: cli-proxy-api-plus-freebsd-amd64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
